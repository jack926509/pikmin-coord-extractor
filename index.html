<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮克敏座標擷取器</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary":                   "#386b02",
          "primary-container":         "#b7f481",
          "on-primary-container":      "#2f5c00",
          "secondary-container":       "#ffd9e2",
          "on-secondary-container":    "#863655",
          "tertiary-container":        "#81d4fa",
          "on-tertiary-container":     "#00485e",
          "tertiary":                  "#006786",
          "surface":                   "#faf9f6",
          "surface-container-lowest":  "#ffffff",
          "surface-container-low":     "#f4f4f0",
          "surface-container":         "#eeeeea",
          "surface-container-high":    "#e8e8e4",
          "surface-container-highest": "#e1e3df",
          "on-surface":                "#303330",
          "on-surface-variant":        "#5d605c",
          "on-background":             "#303330",
          "outline":                   "#797b78",
          "outline-variant":           "#b1b2af",
          "error":                     "#aa371c",
          "error-dim":                 "#821a01",
        },
        borderRadius: {
          "DEFAULT": "1rem",
          "lg":      "2rem",
          "xl":      "3rem",
          "full":    "9999px",
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans", "sans-serif"],
          "body":     ["Be Vietnam Pro", "sans-serif"],
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  body {
    background-color: #faf9f6;
    color: #303330;
    font-family: 'Be Vietnam Pro', sans-serif;
  }
  textarea::placeholder { color: #5d605c; opacity: 0.6; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pikminBob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }
  .anim-fadeup  { animation: fadeUp  0.24s ease both; }
  .anim-slidein { animation: slideIn 0.22s ease both; }
  .pikmin-bob-1 { animation: pikminBob 2.8s ease-in-out infinite; }
  .pikmin-bob-2 { animation: pikminBob 2.8s ease-in-out infinite 0.4s; }
  .pikmin-bob-3 { animation: pikminBob 2.8s ease-in-out infinite 0.9s; }
</style>
</head>
<body class="min-h-screen pb-12">

<!-- ── Pikmin SVG definitions (reusable) ── -->
<svg style="display:none">
  <defs>
    <!-- Red Pikmin -->
    <symbol id="pikmin-red" viewBox="0 0 40 52">
      <line x1="20" y1="4" x2="20" y2="13" stroke="#3a6e1a" stroke-width="1.8" stroke-linecap="round"/>
      <ellipse cx="13" cy="5" rx="6" ry="3.5" fill="#5aab28" transform="rotate(-25 13 5)"/>
      <ellipse cx="27" cy="5" rx="6" ry="3.5" fill="#4a9520" transform="rotate(25 27 5)"/>
      <ellipse cx="20" cy="31" rx="13" ry="14" fill="#e53935"/>
      <ellipse cx="20" cy="30" rx="9" ry="6" fill="#ef5350" opacity="0.5"/>
      <circle cx="14.5" cy="25" r="3.5" fill="white"/>
      <circle cx="25.5" cy="25" r="3.5" fill="white"/>
      <circle cx="15.2" cy="25.6" r="1.8" fill="#222"/>
      <circle cx="26.2" cy="25.6" r="1.8" fill="#222"/>
      <circle cx="14.6" cy="24.8" r="0.9" fill="white"/>
      <circle cx="25.6" cy="24.8" r="0.9" fill="white"/>
      <ellipse cx="13" cy="46" rx="5" ry="3.5" fill="#c62828"/>
      <ellipse cx="27" cy="46" rx="5" ry="3.5" fill="#c62828"/>
    </symbol>
    <!-- Yellow Pikmin -->
    <symbol id="pikmin-yellow" viewBox="0 0 40 52">
      <line x1="20" y1="4" x2="20" y2="12" stroke="#3a6e1a" stroke-width="1.8" stroke-linecap="round"/>
      <ellipse cx="10" cy="8" rx="5" ry="7" fill="#f9a825" transform="rotate(-15 10 8)"/>
      <ellipse cx="30" cy="8" rx="5" ry="7" fill="#f9a825" transform="rotate(15 30 8)"/>
      <ellipse cx="20" cy="31" rx="13" ry="14" fill="#fdd835"/>
      <ellipse cx="20" cy="30" rx="9" ry="6" fill="#ffee58" opacity="0.5"/>
      <circle cx="14.5" cy="25" r="3.5" fill="white"/>
      <circle cx="25.5" cy="25" r="3.5" fill="white"/>
      <circle cx="15.2" cy="25.6" r="1.8" fill="#222"/>
      <circle cx="26.2" cy="25.6" r="1.8" fill="#222"/>
      <circle cx="14.6" cy="24.8" r="0.9" fill="white"/>
      <circle cx="25.6" cy="24.8" r="0.9" fill="white"/>
      <ellipse cx="13" cy="46" rx="5" ry="3.5" fill="#f57f17"/>
      <ellipse cx="27" cy="46" rx="5" ry="3.5" fill="#f57f17"/>
    </symbol>
    <!-- Blue Pikmin -->
    <symbol id="pikmin-blue" viewBox="0 0 40 52">
      <line x1="20" y1="4" x2="20" y2="13" stroke="#3a6e1a" stroke-width="1.8" stroke-linecap="round"/>
      <ellipse cx="13" cy="5" rx="6" ry="3.5" fill="#5aab28" transform="rotate(-25 13 5)"/>
      <ellipse cx="27" cy="5" rx="6" ry="3.5" fill="#4a9520" transform="rotate(25 27 5)"/>
      <ellipse cx="20" cy="31" rx="13" ry="14" fill="#1976d2"/>
      <ellipse cx="20" cy="34" rx="6" ry="3" fill="#1565c0"/>
      <ellipse cx="20" cy="30" rx="9" ry="6" fill="#42a5f5" opacity="0.4"/>
      <circle cx="14.5" cy="25" r="3.5" fill="white"/>
      <circle cx="25.5" cy="25" r="3.5" fill="white"/>
      <circle cx="15.2" cy="25.6" r="1.8" fill="#222"/>
      <circle cx="26.2" cy="25.6" r="1.8" fill="#222"/>
      <circle cx="14.6" cy="24.8" r="0.9" fill="white"/>
      <circle cx="25.6" cy="24.8" r="0.9" fill="white"/>
      <ellipse cx="13" cy="46" rx="5" ry="3.5" fill="#1565c0"/>
      <ellipse cx="27" cy="46" rx="5" ry="3.5" fill="#1565c0"/>
    </symbol>
  </defs>
</svg>

<!-- Top App Bar -->
<header class="sticky top-0 z-50
               bg-[#faf9f6]/85 backdrop-blur-md
               shadow-[0_4px_24px_rgba(48,51,48,0.07)]
               flex items-center justify-between px-6 py-3">
  <div class="flex items-center gap-3">
    <!-- Small Red Pikmin in header -->
    <svg width="22" height="28" aria-hidden="true"><use href="#pikmin-red"/></svg>
    <h1 class="text-lg font-headline font-bold" style="color:#386b02">皮克敏座標擷取器</h1>
  </div>
</header>

<main class="px-5 pt-8 max-w-2xl mx-auto space-y-8">

  <!-- Hero -->
  <section class="flex items-end justify-between gap-4">
    <div class="space-y-1 flex-1">
      <h2 class="text-4xl font-headline font-extrabold tracking-tight text-on-background leading-tight">
        皮克敏<br><span class="text-primary">座標擷取器</span>
      </h2>
      <p class="text-sm font-body text-on-surface-variant mt-2">
        整理繁雜的訊息，一鍵擷取座標存檔。
      </p>
    </div>
    <!-- Pikmin trio decoration -->
    <div class="flex items-end gap-1 flex-shrink-0 pb-1" aria-hidden="true">
      <svg width="38" height="50" class="pikmin-bob-1 opacity-90"><use href="#pikmin-blue"/></svg>
      <svg width="46" height="60" class="pikmin-bob-2"><use href="#pikmin-red"/></svg>
      <svg width="36" height="48" class="pikmin-bob-3 opacity-90"><use href="#pikmin-yellow"/></svg>
    </div>
  </section>

  <!-- Input Card -->
  <section>
    <div class="bg-surface-container-low rounded-lg p-6 shadow-sm">

      <label class="block text-xs font-headline font-semibold text-on-surface-variant
                    uppercase tracking-widest mb-2">訊息內容</label>

      <textarea id="input"
        class="w-full h-48 bg-surface-container-high border-none rounded p-4
               text-on-surface text-sm font-body
               focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest
               outline-none resize-y transition-all"
        placeholder="1. (紐西蘭) Albert-EdenGreenlane&#10;• 座標：-36.891357,174.795049&#10;• 建議：中高優先&#10;&#10;...（支援一次貼多筆）"
        oninput="onInput(this)"></textarea>

      <!-- Inline meta row -->
      <div class="flex items-center justify-between mt-2 px-0.5">
        <span id="line-count" class="text-xs font-body text-on-surface-variant/50">—</span>
        <span class="text-xs font-body text-on-surface-variant/40">
          <kbd class="bg-surface-container border border-outline-variant/40 rounded px-1.5 py-0.5 text-xs">Ctrl</kbd>
          +
          <kbd class="bg-surface-container border border-outline-variant/40 rounded px-1.5 py-0.5 text-xs">Enter</kbd>
        </span>
      </div>

      <!-- Extract -->
      <div class="mt-4">
        <button onclick="extract()"
          class="w-full bg-primary text-white font-headline font-bold py-4 rounded-full
                 shadow-[0_4px_16px_rgba(56,107,2,0.30)]
                 hover:bg-[#2e7a51] active:scale-95 transition-all duration-200
                 flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-[20px]">search</span>
          擷取座標
        </button>
      </div>

      <!-- Clear -->
      <div class="flex justify-center mt-3">
        <button onclick="clearInput()"
          class="w-1/2 bg-surface-container-lowest border border-outline-variant/30
                 text-on-surface-variant/60 font-headline font-semibold text-sm
                 py-3 rounded-full
                 hover:bg-surface-container hover:text-error-dim
                 active:scale-95 transition-all duration-200
                 flex items-center justify-center gap-1.5">
          <span class="material-symbols-outlined text-[16px]">delete_sweep</span>
          清空
        </button>
      </div>
    </div>
  </section>

  <!-- Results -->
  <section id="results" class="space-y-5 hidden anim-fadeup">
    <div class="flex items-center justify-between">
      <h3 class="text-xl font-headline font-bold text-on-background">擷取結果</h3>
      <div class="flex items-center gap-3">
        <span id="count"
          class="text-xs font-body uppercase tracking-widest text-on-surface-variant/60"></span>
        <button id="copy-all-btn" onclick="copyAll()"
          class="hidden bg-surface-container-lowest border border-outline-variant/40
                 text-primary font-headline font-semibold text-xs
                 px-4 py-2 rounded-full
                 hover:bg-primary-container/40 active:scale-95 transition-all duration-200
                 flex items-center gap-1.5">
          <span class="material-symbols-outlined text-[15px]">file_copy</span>
          <span id="copy-all-label">複製全部</span>
        </button>
      </div>
    </div>
    <div id="list" class="space-y-3"></div>
  </section>

  <!-- Info card with Pikmin decoration -->
  <section class="bg-secondary-container rounded-lg p-6 relative overflow-hidden">
    <div class="relative z-10 space-y-2 pr-20">
      <h4 class="font-headline font-bold text-on-secondary-container">使用說明</h4>
      <p class="text-sm text-on-secondary-container/80 leading-relaxed font-body">
        貼入 Telegram 訊息後點擊「擷取座標」，支援負數座標與多筆輸入。
        點擊任一結果卡片可複製該筆座標。
      </p>
    </div>
    <!-- Decorative Pikmin in corner -->
    <div class="absolute right-4 bottom-2 opacity-60 pointer-events-none select-none"
         aria-hidden="true">
      <svg width="60" height="78"><use href="#pikmin-yellow"/></svg>
    </div>
  </section>

</main>

<script>
let coords = [];

// Pikmin icon SVGs for result cards (red / yellow / blue cycle)
const PIKMIN_ICONS = ['pikmin-red', 'pikmin-yellow', 'pikmin-blue'];

function extract() {
  const text = document.getElementById('input').value.trim();
  if (!text) return;
  coords = [];

  const lines   = text.split('\n');
  const coordRe = /[-\d]+\.\d+\s*,\s*[-\d]+\.\d+/g;
  const locRe   = /^\d+[\.\、\)）]\s*(.+)/;
  let label = '';

  for (const line of lines) {
    const l  = line.trim();
    const lm = l.match(locRe);
    if (lm) label = lm[1].replace(/[()（）【】]/g, '').trim();
    const ms = l.match(coordRe);
    if (ms) ms.forEach(c => coords.push({ coord: c.replace(/\s/g, ''), label }));
  }

  render();

  if (coords.length > 0) {
    setTimeout(() => {
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 80);
  }
}

function render() {
  const listEl = document.getElementById('list');
  const resEl  = document.getElementById('results');
  listEl.innerHTML = '';
  resEl.classList.remove('hidden');

  if (coords.length === 0) {
    listEl.innerHTML = `
      <div class="bg-surface-container-low rounded-lg p-10 text-center
                  border border-dashed border-outline-variant/40">
        <span class="material-symbols-outlined text-[40px] text-on-surface-variant/25 block mb-3">
          search_off
        </span>
        <p class="font-headline font-semibold text-on-surface-variant">未找到座標</p>
        <p class="text-sm font-body text-on-surface-variant/50 mt-1">
          請確認格式含「數字,數字」<br>例：-36.891357,174.795049
        </p>
      </div>`;
    document.getElementById('count').textContent = '';
    document.getElementById('copy-all-btn').classList.add('hidden');
    return;
  }

  document.getElementById('count').textContent = `找到 ${coords.length} 個座標`;
  document.getElementById('copy-all-btn').classList.remove('hidden');

  coords.forEach((r, i) => {
    const pikminId = PIKMIN_ICONS[i % PIKMIN_ICONS.length];
    const card = document.createElement('div');
    card.className = [
      'anim-slidein',
      'bg-surface-container-lowest rounded-lg p-5',
      'flex items-center justify-between',
      'shadow-sm cursor-pointer',
      'hover:shadow-md transition-shadow duration-200',
      i === 0 ? 'border-l-4 border-primary' : '',
    ].join(' ');
    card.style.animationDelay = `${Math.min(i * 30, 210)}ms`;

    card.innerHTML = `
      <div class="flex items-center gap-4">
        <div class="w-11 h-11 rounded-full bg-[#81d4fa]/25
                    flex items-center justify-center flex-shrink-0">
          <svg width="28" height="36" aria-hidden="true"><use href="#${pikminId}"/></svg>
        </div>
        <div class="space-y-1">
          <div class="bg-[#81d4fa] text-[#00485e]
                      px-3 py-1 rounded-full text-xs font-headline font-bold w-fit">
            ${esc(r.coord)}
          </div>
          ${r.label
            ? `<p class="text-sm font-body text-on-surface-variant">${esc(r.label)}</p>`
            : ''}
        </div>
      </div>
      <button id="act${i}"
        class="bg-surface-container text-primary p-3 rounded-full
               hover:bg-primary-container/50 active:scale-90 transition-all duration-200
               flex-shrink-0"
        aria-label="複製座標">
        <span class="material-symbols-outlined text-[20px]">content_copy</span>
      </button>
    `;

    const btn = card.querySelector('button');
    btn.addEventListener('click', e => { e.stopPropagation(); copyOne(r.coord, i, card); });
    card.addEventListener('click', () => copyOne(r.coord, i, card));
    listEl.appendChild(card);
  });
}

function flashCopied(iconEl, btnEl, revertIcon) {
  iconEl.textContent = 'check';
  btnEl.classList.add('!bg-primary-container/60');
  setTimeout(() => {
    iconEl.textContent = revertIcon;
    btnEl.classList.remove('!bg-primary-container/60');
  }, 1400);
}

function copyOne(coord, idx, card) {
  navigator.clipboard.writeText(coord)
    .then(() => {
      const btn  = document.getElementById('act' + idx);
      const icon = btn.querySelector('.material-symbols-outlined');
      flashCopied(icon, btn, 'content_copy');
      card.classList.add('!border-primary', 'bg-[#b7f481]/10');
      setTimeout(() => card.classList.remove('!border-primary', 'bg-[#b7f481]/10'), 1400);
    })
    .catch(() => {});
}

function copyAll() {
  if (!coords.length) return;
  navigator.clipboard.writeText(coords.map(r => r.coord).join('\n'))
    .then(() => {
      const btn   = document.getElementById('copy-all-btn');
      const label = document.getElementById('copy-all-label');
      label.textContent = '✓ 已複製全部';
      btn.classList.add('!bg-primary-container/40', '!border-primary/30');
      setTimeout(() => {
        label.textContent = '複製全部';
        btn.classList.remove('!bg-primary-container/40', '!border-primary/30');
      }, 1600);
    })
    .catch(() => {});
}

function clearInput() {
  const el = document.getElementById('input');
  el.value = '';
  onInput(el);
  el.focus();
  coords = [];
  document.getElementById('results').classList.add('hidden');
}

function onInput(el) {
  const lc = document.getElementById('line-count');
  lc.textContent = el.value.trim()
    ? el.value.split('\n').length + ' 行'
    : '—';
}

function esc(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

document.getElementById('input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') extract();
});
</script>
</body>
</html>
