<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮克敏座標擷取器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --surface2: #232329;
    --surface3: #2a2a32;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.10);
    --accent-dim2: rgba(74,222,128,0.20);
    --text: #f4f4f5;
    --text2: #a1a1aa;
    --text3: #52525b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
    --r: 12px;
    --r-sm: 8px;
    --r-xs: 5px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 16px 96px;
  }

  /* 背景格線 */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(74,222,128,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,222,128,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* 頂部光暈 */
  body::after {
    content: '';
    position: fixed;
    top: -180px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 380px;
    background: radial-gradient(ellipse, rgba(74,222,128,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 680px; }

  /* ── Header ─────────────────────────────────────── */
  header { margin-bottom: 44px; }

  .tag {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
    color: var(--accent); text-transform: uppercase;
    border: 1px solid rgba(74,222,128,0.25);
    background: rgba(74,222,128,0.06);
    display: inline-flex; align-items: center; gap: 7px;
    padding: 4px 12px 4px 10px; border-radius: 20px;
    margin-bottom: 18px;
  }
  .tag-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    animation: blink 2.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  h1 {
    font-size: 34px; font-weight: 300; letter-spacing: -0.7px;
    color: var(--text); line-height: 1.15;
  }
  h1 span { color: var(--accent); font-weight: 500; }

  .sub {
    margin-top: 10px; font-size: 13px;
    color: var(--text3); font-weight: 300;
    display: flex; align-items: center; gap: 8px;
  }
  .sub-sep { opacity: 0.4; }

  /* ── 分隔線標籤 ───────────────────────────────── */
  .section-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
    color: var(--text3); text-transform: uppercase;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border2), transparent);
  }

  /* ── Input box ───────────────────────────────── */
  .input-box {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    overflow: hidden;
    margin-bottom: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-box:focus-within {
    border-color: rgba(74,222,128,0.35);
    box-shadow: 0 0 0 3px rgba(74,222,128,0.06);
  }

  textarea {
    display: block; width: 100%;
    background: transparent; border: none; outline: none;
    resize: vertical; min-height: 180px;
    font-family: var(--mono); font-size: 13px; color: var(--text2);
    line-height: 1.75; padding: 14px 16px;
  }
  textarea::placeholder { color: var(--text3); line-height: 1.75; }

  .input-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    font-size: 11.5px; color: var(--text3); font-family: var(--mono);
    gap: 8px;
  }
  .input-footer-left { display: flex; align-items: center; gap: 10px; }

  .line-count { transition: color 0.15s; }
  .line-count.has-content { color: var(--text2); }

  .clear-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-family: var(--mono); font-size: 11px;
    padding: 2px 7px; border-radius: var(--r-xs);
    transition: color 0.15s, background 0.15s;
    letter-spacing: 0.04em;
  }
  .clear-btn:hover { color: var(--text); background: var(--surface2); }

  /* ── 按鈕列 ──────────────────────────────────── */
  .btn-row {
    display: flex; gap: 8px;
    margin-bottom: 32px;
  }

  .extract-btn {
    flex: 1; padding: 13px 20px;
    background: var(--accent-dim);
    border: 1px solid rgba(74,222,128,0.30);
    border-radius: var(--r-sm);
    font-family: var(--mono); font-size: 13.5px; letter-spacing: 0.06em;
    color: var(--accent); cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .extract-btn:hover {
    background: var(--accent-dim2);
    box-shadow: 0 0 20px rgba(74,222,128,0.14);
  }
  .extract-btn:active { transform: scale(0.985); }

  .paste-btn {
    padding: 13px 18px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--r-sm);
    font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.05em;
    color: var(--text2); cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap; flex-shrink: 0;
  }
  .paste-btn:hover { background: var(--surface2); border-color: rgba(74,222,128,0.25); color: var(--text); }

  kbd {
    font-family: var(--mono); font-size: 10.5px;
    border: 1px solid var(--border2); border-radius: 4px;
    padding: 1px 5px; color: var(--text3);
    background: var(--surface2);
  }

  /* ── Results ─────────────────────────────────── */
  #results {
    display: none;
    animation: fadeUp 0.22s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .results-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .results-count {
    font-family: var(--mono); font-size: 12px; color: var(--text3);
    display: flex; align-items: baseline; gap: 6px;
  }
  .results-count strong {
    color: var(--accent); font-weight: 600; font-size: 17px;
  }

  .copy-all-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--r-xs);
    font-family: var(--mono); font-size: 11.5px;
    color: var(--text2); cursor: pointer;
    transition: all 0.15s;
  }
  .copy-all-btn:hover {
    border-color: rgba(74,222,128,0.4);
    color: var(--accent);
    background: var(--accent-dim);
  }
  .copy-all-btn.ok {
    border-color: rgba(74,222,128,0.45);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* ── Coord cards ─────────────────────────────── */
  .coord-list { display: flex; flex-direction: column; gap: 5px; }

  .coord-card {
    display: flex; align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 12px 14px 12px 16px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.15s, transform 0.12s;
    gap: 12px;
    animation: slideIn 0.2s ease both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .coord-card:hover {
    background: var(--surface2);
    border-color: var(--border2);
    transform: translateX(2px);
  }
  .coord-card.flash {
    background: rgba(74,222,128,0.07);
    border-color: rgba(74,222,128,0.28);
  }

  .card-num {
    font-family: var(--mono); font-size: 11px; color: var(--text3);
    min-width: 20px; text-align: right; flex-shrink: 0;
    user-select: none;
  }
  .card-sep {
    width: 1px; height: 28px;
    background: var(--border);
    flex-shrink: 0;
  }
  .card-body { flex: 1; min-width: 0; }
  .card-label {
    font-size: 11px; color: var(--text3);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px; letter-spacing: 0.02em;
  }
  .card-coord {
    font-family: var(--mono); font-size: 15px; font-weight: 600;
    color: var(--text); letter-spacing: 0.02em;
  }
  .card-action {
    font-family: var(--mono); font-size: 11px;
    padding: 5px 12px; border-radius: var(--r-xs);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text3); flex-shrink: 0;
    transition: all 0.15s;
    min-width: 52px; text-align: center;
    user-select: none;
  }
  .coord-card:hover .card-action {
    border-color: rgba(74,222,128,0.30);
    color: var(--accent);
    background: var(--accent-dim);
  }
  .card-action.ok {
    border-color: rgba(74,222,128,0.45);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* ── Empty state ─────────────────────────────── */
  .empty-state {
    padding: 36px 20px;
    text-align: center;
    border: 1px dashed rgba(255,255,255,0.10);
    border-radius: var(--r);
    background: var(--surface);
  }
  .empty-icon { font-size: 24px; margin-bottom: 12px; opacity: 0.4; }
  .empty-msg {
    font-family: var(--mono); font-size: 12.5px; color: var(--text3);
  }
  .empty-hint {
    margin-top: 8px; font-family: var(--mono);
    font-size: 11px; color: var(--text3); opacity: 0.55;
    line-height: 1.8;
  }

  /* ── Scrollbar ───────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Mobile ──────────────────────────────────── */
  @media (max-width: 480px) {
    body { padding: 36px 12px 72px; }
    h1 { font-size: 28px; }
    .btn-row { flex-direction: column; }
    .paste-btn { padding: 12px 16px; }
    .card-coord { font-size: 13.5px; }
    .extract-btn { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="tag">
      <span class="tag-dot"></span>
      Coordinate Extractor
    </div>
    <h1>皮克敏<span>座標擷取器</span></h1>
    <p class="sub">
      貼上 Telegram 訊息
      <span class="sub-sep">→</span>
      一鍵複製座標
    </p>
  </header>

  <div class="section-label">訊息內容</div>

  <div class="input-box">
    <textarea id="input" placeholder="1. (紐西蘭) Albert-EdenGreenlane
• 座標：-36.891357,174.795049
• 建議：中高優先

2. (美国) Rochester
• 座標：44.021698,-92.460725
• 建議：高優先

...（支援一次貼多筆）" oninput="onInput(this)"></textarea>
    <div class="input-footer">
      <div class="input-footer-left">
        <span class="line-count" id="line-count">— 行</span>
        <button class="clear-btn" onclick="clearInput()">清空</button>
      </div>
      <span><kbd>Ctrl</kbd> + <kbd>Enter</kbd> 快速擷取</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="extract-btn" onclick="extract()">
      <span>▶</span> 擷取座標
    </button>
    <button class="paste-btn" onclick="pasteClipboard()">貼上</button>
  </div>

  <div id="results">
    <div class="results-header">
      <div class="results-count" id="count"></div>
      <button class="copy-all-btn" id="copy-all-btn" onclick="copyAll()">
        <span id="copy-all-label">複製全部</span>
      </button>
    </div>
    <div class="coord-list" id="list"></div>
  </div>
</div>

<script>
let coords = [];

function extract() {
  const text = document.getElementById('input').value.trim();
  if (!text) return;
  coords = [];

  const lines = text.split('\n');
  const coordRe = /[-\d]+\.\d+\s*,\s*[-\d]+\.\d+/g;
  const locRe = /^\d+[\.\、\)）]\s*(.+)/;
  let label = '';

  for (const line of lines) {
    const l = line.trim();
    const lm = l.match(locRe);
    if (lm) label = lm[1].replace(/[()（）【】]/g, '').trim();
    const ms = l.match(coordRe);
    if (ms) ms.forEach(c => coords.push({ coord: c.replace(/\s/g, ''), label }));
  }

  render();

  if (coords.length > 0) {
    setTimeout(() => {
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 80);
  }
}

function render() {
  const listEl = document.getElementById('list');
  const resEl  = document.getElementById('results');
  listEl.innerHTML = '';
  resEl.style.display = 'block';

  if (coords.length === 0) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">◎</div>
        <div class="empty-msg">未找到座標</div>
        <div class="empty-hint">
          請確認格式含「數字,數字」<br>
          例：-36.891357,174.795049
        </div>
      </div>`;
    document.getElementById('count').innerHTML = '';
    document.getElementById('copy-all-btn').style.display = 'none';
    return;
  }

  document.getElementById('count').innerHTML =
    `找到 <strong>${coords.length}</strong> 筆座標`;
  document.getElementById('copy-all-btn').style.display = '';

  coords.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'coord-card';
    card.style.animationDelay = `${Math.min(i * 28, 200)}ms`;
    card.innerHTML = `
      <span class="card-num">${i + 1}</span>
      <div class="card-sep"></div>
      <div class="card-body">
        ${r.label ? `<div class="card-label">${esc(r.label)}</div>` : ''}
        <div class="card-coord">${esc(r.coord)}</div>
      </div>
      <span class="card-action" id="act${i}">複製</span>
    `;
    card.addEventListener('click', () => copyOne(r.coord, i, card));
    listEl.appendChild(card);
  });
}

function copyOne(coord, idx, card) {
  navigator.clipboard.writeText(coord).then(() => {
    const act = document.getElementById('act' + idx);
    act.textContent = '✓ 已複製';
    act.classList.add('ok');
    card.classList.add('flash');
    setTimeout(() => {
      act.textContent = '複製';
      act.classList.remove('ok');
      card.classList.remove('flash');
    }, 1400);
  });
}

function copyAll() {
  if (!coords.length) return;
  navigator.clipboard.writeText(coords.map(r => r.coord).join('\n')).then(() => {
    const btn   = document.getElementById('copy-all-btn');
    const label = document.getElementById('copy-all-label');
    label.textContent = '✓ 已複製全部';
    btn.classList.add('ok');
    setTimeout(() => {
      label.textContent = '複製全部';
      btn.classList.remove('ok');
    }, 1600);
  });
}

function clearInput() {
  const el = document.getElementById('input');
  el.value = '';
  onInput(el);
  el.focus();
  document.getElementById('results').style.display = 'none';
  coords = [];
}

async function pasteClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    const el = document.getElementById('input');
    el.value = text;
    onInput(el);
    el.focus();
  } catch {
    document.getElementById('input').focus();
  }
}

function onInput(el) {
  const lc = document.getElementById('line-count');
  if (!el.value.trim()) {
    lc.textContent = '— 行';
    lc.classList.remove('has-content');
  } else {
    lc.textContent = el.value.split('\n').length + ' 行';
    lc.classList.add('has-content');
  }
}

function esc(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

document.getElementById('input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') extract();
});
</script>
</body>
</html>
